---
# PushSecret: Sync a Kubernetes Secret to AWS Secrets Manager
#
# Use case: cert-manager generates a TLS certificate as a K8s Secret.
# This PushSecret watches that Secret and pushes it to AWS Secrets Manager,
# keeping external consumers (e.g., CloudFront, ALB, Lambda) in sync
# without manual export.
#
# Unlike ExternalSecret (pull from external store -> K8s), PushSecret works
# in the opposite direction (K8s -> external store).
#
# The PushSecret manifest itself is safe to commit — it contains no secrets.
# The actual secret values live only in the referenced Kubernetes Secret
# and the target external store.
#
# Prerequisites:
#   - ESO installed with PushSecret CRD (v0.9.0+)
#   - ClusterSecretStore 'aws-secrets-manager' configured (see clustersecretstore-aws.yaml)
#   - IAM policy granting secretsmanager:CreateSecret, PutSecretValue, DescribeSecret
#     on the target secret ARN
#   - The source K8s Secret must already exist (e.g., created by cert-manager)
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: tls-cert-pushsecret
  namespace: cert-manager
  labels:
    app.kubernetes.io/name: tls-cert-pushsecret
    app.kubernetes.io/component: secret-sync
    app.kubernetes.io/part-of: kube-platform
    app.kubernetes.io/managed-by: kubectl
  annotations:
    kubernetes.io/description: >
      Pushes the cert-manager-generated TLS certificate to AWS Secrets Manager
      so external services (CloudFront, ALB, Lambda) can consume it.
spec:
  # updatePolicy controls what happens when the remote secret already exists:
  #   Replace      — overwrite the remote value on every sync (use for rotating certs)
  #   IfNotExists  — only create; never overwrite (use for one-time bootstrap secrets)
  updatePolicy: Replace

  # deletionPolicy controls what happens when this PushSecret is deleted:
  #   Delete — remove the secret from the external store (clean teardown)
  #   None   — leave the remote secret intact (safe default for production)
  deletionPolicy: None

  # How often ESO reconciles the PushSecret and pushes updates
  # Use a short interval for frequently rotated secrets like TLS certs
  refreshInterval: 30m

  # Reference to the ClusterSecretStore that defines the AWS connection
  secretStoreRefs:
    - name: aws-secrets-manager
      kind: ClusterSecretStore

  # Selector: which Kubernetes Secret to push
  selector:
    secret:
      name: wildcard-tls-cert  # Created by cert-manager Certificate resource

  # Match conditions: map each K8s Secret key to a remote path in AWS Secrets Manager
  data:
    # Push the TLS certificate
    - match:
        secretKey: tls.crt                  # Key in the Kubernetes Secret
        remoteRef:
          remoteKey: production/tls/wildcard # Path in AWS Secrets Manager
          property: certificate              # JSON property in the remote secret

    # Push the TLS private key
    - match:
        secretKey: tls.key
        remoteRef:
          remoteKey: production/tls/wildcard
          property: private_key

    # Push the CA certificate chain (if present)
    - match:
        secretKey: ca.crt
        remoteRef:
          remoteKey: production/tls/wildcard
          property: ca_chain

---
# Usage notes:
#
# 1. Create the source Secret (typically via cert-manager Certificate):
#
#    apiVersion: cert-manager.io/v1
#    kind: Certificate
#    metadata:
#      name: wildcard-tls-cert
#      namespace: cert-manager
#    spec:
#      secretName: wildcard-tls-cert
#      issuerRef:
#        name: letsencrypt-prod
#        kind: ClusterIssuer
#      dnsNames:
#        - "*.example.com"
#
# 2. The PushSecret watches 'wildcard-tls-cert' and pushes tls.crt, tls.key,
#    and ca.crt to AWS Secrets Manager at 'production/tls/wildcard'.
#
# 3. External consumers read from AWS Secrets Manager using the IAM-scoped path.
#
# 4. When cert-manager renews the certificate, the PushSecret automatically
#    pushes the updated values (updatePolicy: Replace).
#
# 5. To verify the PushSecret status:
#      kubectl get pushsecret tls-cert-pushsecret -n cert-manager -o yaml
#    Check .status.conditions for 'Ready' and .status.syncedPushSecrets
#    for confirmation that each key was pushed successfully.
