# ==============================================================================
# EXAMPLE SEALED SECRET
# ==============================================================================
# This file IS safe to commit to Git.
# The encrypted values below can only be decrypted by the sealed-secrets
# controller running in your specific cluster (the one that generated
# the encryption key pair).
#
# IMPORTANT: The encryptedData values below are PLACEHOLDER examples.
# Real encrypted values are generated by running:
#   ./seal-secret.sh app-secret workloads DB_PASSWORD=mypassword API_KEY=xyz
#   kubeseal --format yaml < raw-secret.yaml
#
# To generate real encrypted values for your cluster:
#   1. Ensure sealed-secrets-controller is running in kube-system
#   2. Run: ./seal-secret.sh app-secret workloads KEY=value > example-sealed-secret.yaml
#   3. Commit the output file — it is safe to store in Git
#
# To verify the sealed secret was decrypted by the controller:
#   kubectl get secret app-secret -n workloads
#   kubectl describe sealedsecret app-sealed-secret -n workloads
# ==============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: app-sealed-secret
  namespace: workloads
  # SealedSecrets are scoped to namespace+cluster by default.
  # The annotations below are added by kubeseal automatically based on --scope.
  # cluster-scope annotation would be: sealedsecrets.bitnami.com/cluster-wide: "true"
  annotations:
    # sealedsecrets.bitnami.com/managed: "true" tells the controller this
    # SealedSecret is actively managed and should own the resulting Secret.
    sealedsecrets.bitnami.com/managed: "true"
    kubernetes.io/description: >
      Sealed (encrypted) Secret for the app workload. Contains database
      credentials and API keys. Generated by seal-secret.sh. Safe to commit
      to Git — encrypted with the cluster's sealed-secrets controller public key.
  labels:
    app.kubernetes.io/name: app-sealed-secret
    app.kubernetes.io/component: secret
    app.kubernetes.io/part-of: app-platform
    app.kubernetes.io/managed-by: sealed-secrets-controller
    app.kubernetes.io/version: "1.0.0"
    environment: production
spec:
  # ---------------------------------------------------------------------------
  # template: Defines the metadata and type of the resulting Secret object
  # that the controller will create after decryption.
  # ---------------------------------------------------------------------------
  template:
    metadata:
      name: app-secret          # Name of the resulting Kubernetes Secret
      namespace: workloads
      labels:
        app.kubernetes.io/name: app-secret
        app.kubernetes.io/component: secret
        app.kubernetes.io/part-of: app-platform
        app.kubernetes.io/managed-by: sealed-secrets-controller
        environment: production
      annotations:
        kubernetes.io/description: >
          Kubernetes Secret created by sealed-secrets-controller from the
          corresponding SealedSecret. Do not edit this Secret directly —
          changes will be overwritten by the controller. Edit the SealedSecret
          and re-apply instead.
    type: Opaque

  # ---------------------------------------------------------------------------
  # encryptedData: The encrypted key-value pairs.
  # Each value is RSA-OAEP encrypted with the controller's public key.
  # These placeholder values are NOT real — generate yours with kubeseal.
  #
  # PLACEHOLDER VALUES — Replace with output from kubeseal:
  #   kubectl create secret generic app-secret \
  #     --namespace workloads \
  #     --from-literal=DB_PASSWORD=yourpassword \
  #     --from-literal=API_KEY=yourapikey \
  #     --dry-run=client -o yaml \
  #   | kubeseal --namespace workloads --format yaml
  # ---------------------------------------------------------------------------
  encryptedData:
    # DB_PASSWORD encrypted value — placeholder, generated by kubeseal
    DB_PASSWORD: AgBvXmP...PLACEHOLDER...replace-with-real-kubeseal-output==

    # API_KEY encrypted value — placeholder, generated by kubeseal
    API_KEY: AgC3kQr...PLACEHOLDER...replace-with-real-kubeseal-output==

    # DB_HOST encrypted value — placeholder
    DB_HOST: AgDpLmN...PLACEHOLDER...replace-with-real-kubeseal-output==
