---
# Kyverno ClusterPolicy: add-default-labels (MUTATE)
#
# This is a MUTATE policy — it automatically patches resources, not just validates.
# Mutation runs before validation, so mutated resources are then validated.
#
# What it does:
#   1. Adds app.kubernetes.io/managed-by: kyverno if not present
#   2. Adds kubectl.kubernetes.io/default-container annotation using
#      the first container name (enables `kubectl exec` without -c flag)
#
# Rationale:
#   The standard app.kubernetes.io/* label set is required for tooling
#   (Helm, ArgoCD, Prometheus, kubectl) to correctly identify resources.
#   Mutation ensures legacy or third-party deployments conform automatically.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-default-labels
  labels:
    app.kubernetes.io/name: add-default-labels
    app.kubernetes.io/component: policy
    app.kubernetes.io/part-of: kube-platform
    app.kubernetes.io/managed-by: kubectl
  annotations:
    kubernetes.io/description: >
      Mutates Deployments and StatefulSets to add app.kubernetes.io/managed-by
      label and kubectl.kubernetes.io/default-container annotation if absent.
    policies.kyverno.io/title: Add Default Labels and Annotations
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: low
    policies.kyverno.io/subject: Deployment,StatefulSet,DaemonSet
spec:
  rules:
    # Rule 1: Add managed-by label if absent
    - name: add-managed-by-label
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
      mutate:
        patchStrategicMerge:
          metadata:
            labels:
              # +(key) means: only add if not already present
              +(app.kubernetes.io/managed-by): kyverno

    # Rule 2: Add default-container annotation from first container name
    # This enables: kubectl exec deploy/myapp -- bash
    # instead of:   kubectl exec deploy/myapp -c myapp-container -- bash
    - name: add-default-container-annotation
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
      mutate:
        patchStrategicMerge:
          spec:
            template:
              metadata:
                annotations:
                  +(kubectl.kubernetes.io/default-container): "{{ request.object.spec.template.spec.containers[0].name }}"

---
# Kyverno ClusterPolicy: generate-default-networkpolicy (GENERATE)
#
# Automatically creates a default-deny-all NetworkPolicy whenever a new
# Namespace is created. This enforces the deny-all + allow-list security posture
# without requiring manual intervention per namespace.
#
# After creation, add specific allow rules on top of this deny-all base.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-default-networkpolicy
  labels:
    app.kubernetes.io/name: generate-default-networkpolicy
    app.kubernetes.io/component: policy
    app.kubernetes.io/part-of: kube-platform
    app.kubernetes.io/managed-by: kubectl
  annotations:
    kubernetes.io/description: >
      Automatically generates a default-deny-all NetworkPolicy in every new namespace.
      This enforces the zero-trust network model without manual per-namespace setup.
    policies.kyverno.io/title: Generate Default NetworkPolicy
    policies.kyverno.io/category: Multi-Tenancy
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Namespace
spec:
  rules:
    - name: generate-deny-all-networkpolicy
      match:
        any:
          - resources:
              kinds:
                - Namespace
      exclude:
        any:
          - resources:
              names:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - cert-manager
                - monitoring
                - argocd
      generate:
        # synchronize: true means Kyverno will re-create the NetworkPolicy
        # if it is manually deleted (enforces compliance continuously)
        synchronize: true
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        name: default-deny-all
        namespace: "{{ request.object.metadata.name }}"
        data:
          metadata:
            labels:
              app.kubernetes.io/managed-by: kyverno
              kyverno.io/generated-by: generate-default-networkpolicy
            annotations:
              kubernetes.io/description: >
                Default deny-all NetworkPolicy auto-generated by Kyverno.
                Add specific allow rules to permit required traffic.
          spec:
            # Empty podSelector matches ALL pods in the namespace
            podSelector: {}
            # Declaring both types with no rules = deny all ingress and egress
            policyTypes:
              - Ingress
              - Egress
