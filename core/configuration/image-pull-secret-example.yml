# ==============================================================================
# imagePullSecret — Registry Authentication for Private Container Images
# ==============================================================================
# When pods pull images from private registries (GitHub Container Registry,
# AWS ECR, GCR, Docker Hub private repos), the kubelet needs credentials.
# imagePullSecrets attach those credentials to pods.
#
# FILE NAMING NOTE:
#   This file is named "image-pull-secret-example.yml" (not "*-secret.yml")
#   to comply with the .gitignore rule that excludes "*-secret.yml" patterns.
#   This file contains PLACEHOLDER values only — never commit real credentials.
#
# HOW TO CREATE THE SECRET (do NOT manually create the base64 value):
#
#   Option 1: kubectl create (recommended — handles base64 encoding automatically)
#     kubectl create secret docker-registry my-registry-secret \
#       --docker-server=ghcr.io \
#       --docker-username="${GITHUB_USER}" \
#       --docker-password="${GITHUB_TOKEN}" \
#       --namespace=workloads
#
#   Option 2: AWS ECR (tokens expire every 12 hours — use a CronJob to refresh)
#     aws ecr get-login-password --region us-east-1 \
#       | kubectl create secret docker-registry ecr-secret \
#           --docker-server=123456789.dkr.ecr.us-east-1.amazonaws.com \
#           --docker-username=AWS \
#           --docker-password-stdin \
#           --namespace=workloads
#
#   Option 3: Google Artifact Registry
#     kubectl create secret docker-registry gcr-secret \
#       --docker-server=us-central1-docker.pkg.dev \
#       --docker-username=_json_key \
#       --docker-password="$(cat sa-key.json)" \
#       --namespace=workloads
#
# THE .dockerconfigjson FORMAT:
#   The Secret's data field contains a single key ".dockerconfigjson" whose
#   value is base64-encoded JSON:
#     {
#       "auths": {
#         "ghcr.io": {
#           "username": "myuser",
#           "password": "ghp_token...",
#           "auth": "<base64(username:password)>"
#         }
#       }
#     }
#   kubectl create secret docker-registry generates this JSON automatically.
#
# HOW TO ATTACH TO A SERVICEACCOUNT (so ALL pods in the namespace inherit it):
#   kubectl patch serviceaccount default -n workloads \
#     -p '{"imagePullSecrets": [{"name": "my-registry-secret"}]}'
#   After this, every pod using the "default" ServiceAccount automatically gets
#   the imagePullSecret — no per-pod annotation needed.
#   To verify: kubectl get serviceaccount default -n workloads -o yaml
#
# Apply:
#   # Do NOT apply this file directly — it contains placeholder values.
#   # Use kubectl create secret docker-registry (see above).
#   # This file is for documentation and reference only.
# ==============================================================================

# ── EXAMPLE SECRET MANIFEST (placeholder values — do not use directly) ────────
# This shows the STRUCTURE of a kubernetes.io/dockerconfigjson Secret.
# The base64 value below is a placeholder — the real value is generated by
# kubectl create secret docker-registry.
#
# The placeholder base64 decodes to:
#   {"auths":{"ghcr.io":{"username":"PLACEHOLDER","password":"PLACEHOLDER","auth":"PLACEHOLDER"}}}
apiVersion: v1
kind: Secret
metadata:
  name: my-registry-secret
  namespace: workloads

  labels:
    app.kubernetes.io/name: my-registry-secret
    app.kubernetes.io/instance: my-registry-secret
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: configuration
    app.kubernetes.io/part-of: kube-platform
    app.kubernetes.io/managed-by: kubectl

  annotations:
    kubernetes.io/description: >-
      PLACEHOLDER ONLY — do not apply this file. Contains a placeholder
      dockerconfigjson for documenting the imagePullSecret structure.
      Create the real secret with: kubectl create secret docker-registry
      my-registry-secret --docker-server=ghcr.io --docker-username=USER
      --docker-password=TOKEN --namespace=workloads

# type: kubernetes.io/dockerconfigjson is required for registry auth secrets.
# Other Secret types: Opaque (generic), kubernetes.io/tls (TLS certs),
# kubernetes.io/service-account-token (SA tokens).
type: kubernetes.io/dockerconfigjson

data:
  # This placeholder decodes to a valid JSON structure with dummy values.
  # Replace with output from: kubectl create secret docker-registry ... -o yaml
  # NEVER commit a real token here.
  .dockerconfigjson: >-
    eyJhdXRocyI6eyJnaGNyLmlvIjp7InVzZXJuYW1lIjoiUExBQ0VIT0xERVIiLCJwYXNzd29yZCI6
    IlBMQUNFSE9MREVSIiwiYXV0aCI6IlVFd0FRMFZJVDFoRVJWSTZVRXdBUTBWSVQxaEVSVkk9In19fQ==

---
# ── POD EXAMPLE: Using imagePullSecrets directly on a pod spec ────────────────
# Apply the imagePullSecret directly when you want per-pod control.
# For namespace-wide pull credentials, patch the ServiceAccount instead (see above).
apiVersion: v1
kind: Pod
metadata:
  name: private-image-pod
  namespace: workloads

  labels:
    app.kubernetes.io/name: private-image-pod
    app.kubernetes.io/instance: private-image-pod
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: demo
    app.kubernetes.io/part-of: kube-platform
    app.kubernetes.io/managed-by: kubectl

  annotations:
    kubernetes.io/description: >-
      Example pod pulling from a private registry using imagePullSecrets.
      In production, attach the secret to the ServiceAccount instead of
      specifying imagePullSecrets on every pod.

spec:
  automountServiceAccountToken: false
  terminationGracePeriodSeconds: 30

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 2000
    seccompProfile:
      type: RuntimeDefault

  # imagePullSecrets: list of Secrets containing registry credentials.
  # The kubelet tries each Secret in order until one succeeds.
  # Multiple secrets can be listed for multiple registries.
  imagePullSecrets:
    - name: my-registry-secret  # Created by: kubectl create secret docker-registry

  volumes:
    - name: tmp
      emptyDir: {}

  containers:
    - name: app
      # Replace with your actual private image.
      # Format: <registry>/<org>/<image>:<tag>
      # Examples:
      #   ghcr.io/my-org/my-app:v1.2.3
      #   123456789.dkr.ecr.us-east-1.amazonaws.com/my-app:latest
      #   us-central1-docker.pkg.dev/my-project/my-repo/my-app:v1.0
      image: ghcr.io/my-org/my-app:v1.0.0

      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL

      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "256Mi"

      volumeMounts:
        - name: tmp
          mountPath: /tmp
