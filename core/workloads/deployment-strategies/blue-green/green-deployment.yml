apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-green
  namespace: blue-green-demo
  labels:
    app.kubernetes.io/name: nginx-bluegreen
    app.kubernetes.io/instance: nginx-green
    app.kubernetes.io/version: "1.25"
    app.kubernetes.io/component: webserver
    app.kubernetes.io/part-of: kube-platform
    app.kubernetes.io/managed-by: kubectl
    slot: green
  annotations:
    kubernetes.io/description: "Green deployment (nginx:1.25) — staged. Verify health, then switch service selector to route traffic."
spec:
  # Green starts with the same replica count as blue.
  # In cost-sensitive environments, you may start green with 1 replica for testing,
  # then scale to full replicas just before the traffic switch:
  # kubectl scale deployment/nginx-green --replicas=4 -n blue-green-demo
  replicas: 4

  revisionHistoryLimit: 5
  minReadySeconds: 10

  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-bluegreen
      app.kubernetes.io/instance: nginx-green

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-bluegreen
        app.kubernetes.io/instance: nginx-green
        app.kubernetes.io/version: "1.25"
        app.kubernetes.io/component: webserver
        app.kubernetes.io/part-of: kube-platform
        app.kubernetes.io/managed-by: kubectl
        slot: green
        # THE KEY LABEL FOR BLUE-GREEN ROUTING:
        # The service.yml selector must be changed from 'version: v1' to 'version: v2'
        # to route traffic here. The switch command:
        # kubectl patch service nginx-bluegreen -n blue-green-demo \
        #   -p '{"spec":{"selector":{"version":"v2"}}}'
        version: v2
      annotations:
        kubernetes.io/description: "Green (v2) NGINX pod — staged for release. Receives no traffic until the service selector is switched."
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60

      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: nginx
          # v2 image — the new version to be promoted.
          image: nginx:1.25
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
