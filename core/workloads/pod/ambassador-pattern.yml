# ==============================================================================
# Ambassador Sidecar Pattern
# ==============================================================================
# The Ambassador pattern uses a sidecar container to PROXY outbound connections
# from the main application container. The application connects to localhost on
# a well-known port; the ambassador sidecar forwards those connections to the
# actual remote endpoint.
#
# WHY USE THE AMBASSADOR PATTERN:
#   1. Protocol translation: the app speaks a simple protocol (plain TCP); the
#      ambassador handles TLS, authentication headers, connection pooling, or
#      retries without the app knowing.
#   2. External service abstraction: the app always connects to "localhost:5432"
#      regardless of where the actual database lives. Changing backends requires
#      only updating the ambassador container — not redeploying the app.
#   3. Connection pooling: the ambassador maintains a pool of persistent
#      connections to the external service, reducing per-request connection
#      overhead for stateless app pods.
#   4. Migration path: during a database migration (on-prem → cloud), swap the
#      ambassador's target without changing the application at all.
#
# COMPARISON TO SIDECAR PATTERN:
#   Sidecar:     extends the main container's functionality (log shipping,
#                metrics collection, service mesh proxy like Envoy).
#   Ambassador:  specifically proxies OUTBOUND connections to external services.
#                It is a specialization of the sidecar pattern focused on egress.
#
# SHARED NETWORK NAMESPACE:
#   All containers in a Pod share the same network namespace automatically.
#   This means:
#     - The ambassador container's listen socket on localhost:5432 is visible
#       to the main app container.
#     - No special configuration is needed — they share the same loopback (lo)
#       interface.
#     - The main app connects to "localhost:5432" as if it were a local service.
#
# WHEN TO USE AMBASSADOR vs. ExternalName SERVICE:
#   ExternalName: pure DNS CNAME, no proxying, no transformation. Simple and
#                 low-overhead. Use when the app can connect directly to the
#                 external service with no changes.
#   Ambassador:   active proxy. Use when you need connection pooling, protocol
#                 translation, mTLS termination, retry logic, or connection
#                 multiplexing.
#
# Apply:
#   kubectl apply -f ambassador-pattern.yml
#   kubectl logs -n workloads ambassador-demo -c app
#   kubectl logs -n workloads ambassador-demo -c ambassador
# ==============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: ambassador-demo
  namespace: workloads

  labels:
    app.kubernetes.io/name: ambassador-demo
    app.kubernetes.io/instance: ambassador-demo
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: demo
    app.kubernetes.io/part-of: kube-platform
    app.kubernetes.io/managed-by: kubectl

  annotations:
    kubernetes.io/description: >-
      Demonstrates the Ambassador sidecar pattern. The main app container
      connects to localhost:5432 (PostgreSQL). The ambassador container
      (socat) forwards those connections to external-postgres.example.com:5432.
      Both containers share the pod network namespace automatically.

spec:
  automountServiceAccountToken: false
  terminationGracePeriodSeconds: 30

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 2000
    seccompProfile:
      type: RuntimeDefault

  volumes:
    # Ambassador container: socat writes to /tmp for its socket/temp files.
    # readOnlyRootFilesystem: true requires an emptyDir for any writable path.
    - name: ambassador-tmp
      emptyDir: {}
    # Main app temp space
    - name: app-tmp
      emptyDir: {}

  containers:
    # ── Main Application Container ────────────────────────────────────────────
    # The app connects to localhost:5432 as if PostgreSQL were local.
    # It has no knowledge of the external database hostname. This is the key
    # decoupling that the ambassador pattern provides.
    - name: app
      image: busybox:1.36
      imagePullPolicy: IfNotPresent

      command:
        - /bin/sh
        - -c
        - |
          echo "=== Ambassador Pattern Demo ==="
          echo "App container starting. Will attempt to reach PostgreSQL via ambassador..."
          echo "Connecting to localhost:5432 (ambassador will forward to external DB)..."
          # In a real app, this would be: psql -h localhost -p 5432 -U myuser mydb
          # Here we just demonstrate the connection attempt to localhost.
          # The ambassador sidecar should be listening on localhost:5432.
          until nc -z localhost 5432; do
            echo "Waiting for ambassador to be ready on localhost:5432..."
            sleep 2
          done
          echo "Ambassador is ready on localhost:5432."
          echo "In production, the app would now open a DB connection to localhost:5432."
          # Simulate steady-state operation
          while true; do
            echo "$(date -u) App is running, DB reachable via ambassador at localhost:5432"
            sleep 30
          done

      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL

      resources:
        requests:
          memory: "64Mi"
          cpu: "50m"
        limits:
          memory: "64Mi"

      volumeMounts:
        - name: app-tmp
          mountPath: /tmp

    # ── Ambassador Sidecar Container ──────────────────────────────────────────
    # socat listens on localhost:5432 and forwards each connection to the
    # external PostgreSQL endpoint. It handles the actual TCP connection to
    # the external host, including any network-level concerns (timeouts, etc.).
    #
    # socat syntax: socat <listen-spec> <connect-spec>
    #   TCP-LISTEN:5432   — listen on TCP port 5432
    #   ,fork             — fork a child for each connection (handle multiple clients)
    #   ,reuseaddr        — allow immediate reuse of the port after restart
    #   ,bind=127.0.0.1   — listen only on loopback (not accessible outside pod)
    #   TCP:host:port     — connect to the external endpoint
    - name: ambassador
      # busybox includes socat in its 'extras' package.
      # In production, use a purpose-built image with socat pre-installed:
      # e.g., alpine/socat or ghcr.io/alpine/socat for a smaller attack surface.
      image: busybox:1.36
      imagePullPolicy: IfNotPresent

      command:
        - /bin/sh
        - -c
        - |
          echo "Ambassador sidecar starting..."
          echo "Forwarding localhost:5432 → external-postgres.example.com:5432"
          # socat forks a new process for each incoming connection.
          # Each fork handles exactly one client connection, then exits.
          # This is the standard socat pattern for simple TCP proxying.
          exec socat \
            TCP-LISTEN:5432,fork,reuseaddr,bind=127.0.0.1 \
            TCP:external-postgres.example.com:5432

      # Ambassador needs no special privileges for TCP proxying.
      # socat writes temp files to /tmp — mount an emptyDir for this.
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL

      resources:
        requests:
          memory: "32Mi"
          cpu: "25m"
        limits:
          memory: "64Mi"

      volumeMounts:
        # socat needs /tmp for temporary socket files during connection setup.
        # Without this, readOnlyRootFilesystem: true causes socat to fail.
        - name: ambassador-tmp
          mountPath: /tmp
