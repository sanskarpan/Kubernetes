apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache
  namespace: multi-tier
  labels:
    app.kubernetes.io/name: cache
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: multi-tier
    app.kubernetes.io/version: "7.2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cache
      app.kubernetes.io/part-of: multi-tier
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cache
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: multi-tier
        app.kubernetes.io/version: "7.2"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault

      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30

      containers:
        - name: redis
          image: redis:7.2-alpine
          imagePullPolicy: IfNotPresent
          command:
            - redis-server
            - --maxmemory
            - 128mb
            - --maxmemory-policy
            - allkeys-lru
            - --save
            - ""

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP

          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3

          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi

          volumeMounts:
            - name: data
              mountPath: /data

      volumes:
        - name: data
          emptyDir: {}
