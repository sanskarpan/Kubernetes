apiVersion: v1
kind: Service
metadata:
  name: cache
  namespace: multi-tier
  labels:
    app.kubernetes.io/name: cache
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: multi-tier
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    app.kubernetes.io/name: cache
    app.kubernetes.io/part-of: multi-tier
